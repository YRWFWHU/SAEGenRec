dataset:
  name: "amazon2015"
  category: "Beauty"
  raw_dir: "data/raw"

processing:
  kcore_threshold: 5
  split_strategy: "loo"
  split_ratio: [0.8, 0.1, 0.1]
  max_seq_len: 20
  num_negatives: 49
  seed: 42

tokenizer:
  name: "passthrough"
  params: {}

semantic_embedding:
  enabled: true
  name: "sentence-transformer"
  model_name: "all-MiniLM-L6-v2"
  text_fields:
    - "title"
    - "brand"
    - "description"
    - "price"
  normalize: false
  batch_size: 256
  device: "cuda"

# collaborative_embedding:
#   enabled: true
#   name: "sasrec"
#   loss_type: "BPR"
#   hidden_size: 64
#   num_layers: 2
#   num_heads: 2
#   max_seq_len: 20
#   dropout: 0.2
#   learning_rate: 0.001
#   batch_size: 2048
#   num_epochs: 200
#   eval_top_k: [5, 10, 20]
#   device: "cuda"
#   seed: 42

item_tokenizer:
  enabled: true
  name: "rqvae"
  num_codebooks: 8
  codebook_size: 256
  collision_strategy: "append_level"
  params:
    hidden_dim: 256
    latent_dim: 64
    lr: 0.001
    epochs: 100
    batch_size: 512
    device: "cuda"

  # --- SAE tokenizer example ---
  # To use SAE instead of RQ-VAE, change name to "sae":
  
  # name: "sae"
  # num_codebooks: 8                   # → top_k (number of SID codes)
  # codebook_size: 4096                # → d_sae (concept vocabulary size)
  # params:
  #   # d_sae: 8192                    # explicit override for codebook_size
  #   # top_k: 8                       # explicit override for num_codebooks
  #   learning_rate: 0.001
  #   epochs: 100
  #   batch_size: 2048
  #   device: "cuda"
  #   l0_coefficient: 0.001
  #   jumprelu_bandwidth: 0.05
  #   jumprelu_init_threshold: 0.01
  #   seed: 42

sft_builder:
  enabled: false
  tasks:
    - "seqrec"
    - "item2index"
    - "index2item"
  template_file: "configs/templates/sft_prompts.yaml"
  max_history_len: 20
  seed: 42

sft_training:
  enabled: false
  model_name_or_path: "Qwen/Qwen2.5-0.5B-Instruct"
  sft_data_dir: "data/processed/amazon2015/Beauty/sft_data"
  sid_map_path: "data/processed/amazon2015/Beauty/item_sid_map"
  output_dir: "models/sft"

  tasks:
    - "seqrec"
    - "item2index"
    - "index2item"
  task_weights: {}

  lora:
    enabled: true
    r: 8
    alpha: 16
    dropout: 0.05
    target_modules:
      - "q_proj"
      - "v_proj"
      - "k_proj"
      - "o_proj"
      - "gate_proj"
      - "down_proj"
      - "up_proj"
    modules_to_save:
      - "embed_tokens"
      - "lm_head"

  training:
    num_epochs: 3
    per_device_train_batch_size: 4
    per_device_eval_batch_size: 4
    gradient_accumulation_steps: 4
    learning_rate: 2.0e-5
    lr_scheduler_type: "cosine"
    warmup_ratio: 0.15
    weight_decay: 0.01
    max_seq_length: 512
    fp16: false
    bf16: true
    gradient_checkpointing: true

  evaluation:
    eval_steps: 1000
    rec_eval_steps: 3000
    save_steps: 1000
    save_total_limit: 3
    eval_top_k: [1, 5, 10]
    max_new_tokens: 32
    constrained_decoding: true
    do_test: true

  logging:
    report_to: "tensorboard"

output:
  interim_dir: "data/interim"
  processed_dir: "data/processed"

dataset:
  name: "amazon2015"
  category: "Baby"
  raw_dir: "data/raw"

processing:
  kcore_threshold: 5
  split_strategy: "loo"
  split_ratio: [0.8, 0.1, 0.1]
  max_seq_len: 20

tokenizer:
  name: "passthrough"
  params: {}

embedding:
  enabled: false
  model_name: "all-MiniLM-L6-v2"
  text_fields:
    - "title"
    - "brand"
    - "categories"
  batch_size: 256
  device: "cpu"

output:
  interim_dir: "data/interim"
  processed_dir: "data/processed"

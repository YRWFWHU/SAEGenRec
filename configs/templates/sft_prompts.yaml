seqrec:
  - instruction: "Based on the user's interaction history, predict the next item the user might interact with."
    input_template: "User interaction history (in chronological order): {history_sids}"
    output_template: "{target_sid}"
  - instruction: "The user has sequentially interacted with the following items. What item will they engage with next?"
    input_template: "Interaction sequence: {history_sids}"
    output_template: "{target_sid}"
  - instruction: "Given the user's past interactions listed below, recommend the next item."
    input_template: "Past items: {history_sids}"
    output_template: "{target_sid}"
  - instruction: "Predict the next item a user would interact with based on their history."
    input_template: "History: {history_sids}"
    output_template: "{target_sid}"
  - instruction: "A user has interacted with items in the following order. Suggest what they might like next."
    input_template: "Ordered interaction list: {history_sids}"
    output_template: "{target_sid}"

item2index:
  - instruction: "Given the following item information, predict its semantic ID."
    input_template: "Item title: {title}"
    output_template: "{sid_tokens}"
  - instruction: "What is the semantic ID for the item described below?"
    input_template: "Item: {title}"
    output_template: "{sid_tokens}"
  - instruction: "Convert the following item title to its corresponding semantic index."
    input_template: "Title: {title}"
    output_template: "{sid_tokens}"
  - instruction: "Find the semantic ID that represents the following item."
    input_template: "Item name: {title}"
    output_template: "{sid_tokens}"
  - instruction: "Map the item below to its semantic identifier."
    input_template: "Product: {title}"
    output_template: "{sid_tokens}"

index2item:
  - instruction: "Given the following semantic ID, predict the item title."
    input_template: "Semantic ID: {sid_tokens}"
    output_template: "{title}"
  - instruction: "What item does the following semantic index represent?"
    input_template: "Index: {sid_tokens}"
    output_template: "{title}"
  - instruction: "Convert the semantic ID below to the corresponding item name."
    input_template: "Semantic ID: {sid_tokens}"
    output_template: "{title}"
  - instruction: "Identify the item represented by the following semantic identifier."
    input_template: "ID: {sid_tokens}"
    output_template: "{title}"
  - instruction: "Look up the item title for the given semantic ID."
    input_template: "Semantic identifier: {sid_tokens}"
    output_template: "{title}"
